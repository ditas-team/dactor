[package]
name = "dactor-kameo"
version = "0.1.0"
edition = "2021"
description = "Kameo adapter for the dactor distributed actor framework"
license = "MIT"
repository = "https://github.com/Yaming-Hub/dactor"
homepage = "https://github.com/Yaming-Hub/dactor"
readme = "README.md"
keywords = ["actor", "distributed", "kameo", "framework", "runtime"]
categories = ["concurrency", "network-programming"]

[dependencies]
dactor = { version = "0.1.0", path = "../dactor" }
kameo = "0.19.2"
tokio = { version = "1", features = ["time", "rt", "sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
